<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body>
    <header class="top">
      <img class="top-img" src="./eisenhower-matrix.jpg" alt="eisenhower-matrix">
      <a class="more-info" href="https://goal-life.com/page/method/matrix-eisenhower">
        Want more details?
      </a>
    </header>
    <main class="main">
      <div id="add-new-task">
        <label class="label label-new-task" for="new-task-input">Add Item</label>
        <div class="task-row-wrapper">
          <input id="new-task-input"class="input input-task" type="text">
          <button class="btn btn-add-new-task">Add</button>
        </div>
      </div>
      <section class="todo">
        <h3 class="section-title">Todo</h3>
        <ul id="incomplete-tasks">
          <li class="list-item">
            <input class="checkbox" type="checkbox">
            <label class="label label-task">Pay Bills</label>
            <input type="text" class="input input-task">
            <button class="btn btn-edit">Edit</button>
            <button class="btn btn-delete">
              <img class="img-remove" src="./remove.svg" alt="delete">
            </button>
          </li>
          <li class="list-item edit-mode">
            <input class="checkbox" type="checkbox">
            <label class="label label-task">Go Shopping</label>
            <input type="text" value="Go Shopping" class="input input-task">
            <button class="btn btn-edit">Save</button>
            <button class="btn btn-delete">
              <img class="img-remove" src="./remove.svg" alt="delete">
            </button>
          </li>
        </ul>
      </section>
      <section class="completed">
        <h3 class="section-title">Completed</h3>
        <ul id="completed-tasks">
          <li class="list-item">
            <input class="checkbox" type="checkbox" checked>
            <label class="label label-task">See the Doctor</label>
            <input type="text" class="input input-task">
            <button class="btn btn-edit">Edit</button>
            <button class="btn btn-delete">
              <img class="img-remove" src="./remove.svg" alt="delete">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
